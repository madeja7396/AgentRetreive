name: CD Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional label for artifact naming in manual runs"
        required: false
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release label
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            label="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            label="${{ inputs.release_tag }}"
          else
            label="manual-${GITHUB_SHA::7}"
          fi
          echo "label=${label}" >> "$GITHUB_OUTPUT"

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="dist/agentretrieve-${{ steps.vars.outputs.label }}.tar.gz"
          tar -czf "$archive" \
            AGENTS.md \
            outline.md \
            plan.md \
            docs \
            tasks
          sha256sum "$archive" > dist/SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentretrieve-${{ steps.vars.outputs.label }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
