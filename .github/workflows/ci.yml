name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    name: Contract Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate contracts
        run: bash scripts/ci/run_contract_harness.sh --refresh

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q

  figure-integrity:
    name: Figure Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate figure integrity
        run: python3 scripts/ci/validate_figure_integrity.py --check-generator

      - name: Validate TEMPLATE bundle
        run: |
          python3 -m pip install --upgrade pip
          python3 scripts/dev/sync_template_bundle.py --check

  release-ready:
    name: Release Ready
    runs-on: ubuntu-latest
    needs: [contracts, tests, figure-integrity]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pyyaml

      - name: Run release-ready gate
        env:
          PYTHONPATH: src
        run: |
          # Note: RUN_ID is not available in CI without artifacts, so we skip figure generation
          echo "=== Release Gate ==="
          echo "[1/3] Running tests..."
          python3 -m pytest tests/ -q
          echo "[2/3] Checking contracts..."
          python3 scripts/ci/validate_contracts.py
          echo "[3/3] Checking TEMPLATE sync..."
          python3 scripts/dev/sync_template_bundle.py --check
          echo "=== Release Ready ==="

  template-init-smoke:
    name: Template Init Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Run template-init smoke test (strict)
        run: |
          echo "=== Template Init Smoke Test (Strict) ==="
          echo "[1/5] Initializing project from TEMPLATE..."
          python3 scripts/dev/init_project_from_template.py \
            --target /tmp/agentretrieve-template-smoke \
            --name "SmokeTest" \
            --owner "core_quality"
          echo "[2/5] Validate contracts in generated project..."
          cd /tmp/agentretrieve-template-smoke && python3 scripts/ci/validate_contracts.py
          echo "[3/5] Run pytest (minimum tests)..."
          cd /tmp/agentretrieve-template-smoke && python3 -m pytest tests/ -v
          echo "[4/5] Template sync check..."
          cd /tmp/agentretrieve-template-smoke && python3 scripts/dev/sync_template_bundle.py --check
          echo "[5/5] Cleanup..."
          rm -rf /tmp/agentretrieve-template-smoke
          echo "=== Template Init Smoke Test Passed ==="
